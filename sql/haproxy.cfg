global
    log stdout format raw local0
    stats socket /tmp/haproxy.sock mode 600 level admin
    stats timeout 2m
    # Add global max connections
    maxconn 4000

defaults
    log     global
    mode    tcp
    option  tcplog
    timeout connect 10s
    # Increased timeouts for complex queries
    timeout client  3m
    timeout server  3m

frontend stats
    bind *:8404
    mode http
    stats enable
    stats uri /
    stats refresh 10s
    stats admin if TRUE

frontend mysql_front
    bind *:3310
    mode tcp
    option tcplog
    # Reduced inspection delay - 2s is usually sufficient
    tcp-request inspect-delay 2s
    tcp-request content accept if WAIT_END
    # Set frontend connection limit
    maxconn 2000
    
    # Detectar consultas de escritura y enviarlas al master
    acl is_write_query payload(0,100) -m reg -i "(?i)(INSERT|UPDATE|DELETE|REPLACE|CREATE|DROP|ALTER|TRUNCATE|RENAME|CALL|LOCK|UNLOCK)\s+"
    
    # Todas las escrituras van SIEMPRE al master
    use_backend mysql_master if is_write_query
    
    # Lecturas van al backend de lecturas (master y slaves)
    default_backend mysql_read

# Backend exclusivo para escrituras: solo master
backend mysql_master
    mode tcp
    option tcp-check
    option mysql-check user haproxy
    timeout check 3s
    server master mariadb-master:3306 check weight 1 maxconn 1000

# Backend para lecturas: balanceo entre master y esclavos
backend mysql_read
    mode tcp
    balance leastconn
    option tcp-check
    option mysql-check user haproxy
    default-server inter 3s fall 3 rise 2
    timeout check 3s
    # Incluir el master para lecturas con menor peso
    server master mariadb-master:3306 check weight 1 maxconn 300
    server slave1 mariadb-slave1:3306 check weight 3 maxconn 800
    server slave2 mariadb-slave2:3306 check weight 3 maxconn 800